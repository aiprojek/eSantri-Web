
name: Release App

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag rilis untuk workflow manual (contoh: v1.2.3)"
        required: true
        type: string

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # --- Install Dependencies ---
      
      # Ubuntu
      - name: Install dependencies (ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf imagemagick

      # macOS
      - name: Install dependencies (macos)
        if: matrix.platform == 'macos-latest'
        run: brew install imagemagick

      # Windows
      - name: Install dependencies (windows)
        if: matrix.platform == 'windows-latest'
        run: choco install imagemagick --no-progress

      # --- Build Process ---

      - name: Install Frontend dependencies
        run: npm ci

      # FIX: Generate App Icons robustly
      # 1. Convert SVG to large PNG using ImageMagick (avoids Tauri SVG decoder issues)
      # 2. Use Tauri CLI to generate all icon sizes from the PNG
      
      - name: Generate Icons (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p src-tauri/icons
          convert -background none -resize 1024x1024 public/icon.svg public/icon-source.png
          npm run tauri -- icon public/icon-source.png

      - name: Generate Icons (Windows)
        if: runner.os == 'Windows'
        run: |
          if not exist "src-tauri\icons" mkdir "src-tauri\icons"
          magick public/icon.svg -background none -resize 1024x1024 public/icon-source.png
          npm run tauri -- icon public/icon-source.png
        shell: cmd

      # Validate frontend typecheck before packaging (avoid double-build/version bump)
      - name: Check Frontend Types
        run: npm run lint

      - name: Check Tauri Version Sync
        run: npm run check:tauri-version

      # Build & Bundle Desktop App
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.release_tag || github.ref_name }}
          releaseName: 'eSantri App v__VERSION__'
          releaseBody: 'Lihat bagian Assets untuk mengunduh aplikasi sesuai OS Anda.'
          releaseDraft: true
          prerelease: false
